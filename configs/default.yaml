runtime:
  seed: 42
  split_seed: 7
  auto_mount_drive: true
  local_root: "."
  colab_drive_root: "/content/drive/MyDrive/comp646_multimodal_contradiction"
  colab_dataset_root: "/content/comp646_datasets/coco2017"

paths:
  dataset_root: "artifacts/datasets/coco2017"
  benchmark_root: "artifacts/benchmark"
  checkpoint_root: "artifacts/checkpoints"
  log_root: "artifacts/logs"
  metrics_root: "artifacts/metrics"
  figure_root: "artifacts/figures"
  qwen_root: "artifacts/qwen"

data:
  prototype_families: 1200
  midscale_families: 4000
  final_families: 6000
  split_ratio: [0.7, 0.15, 0.15]
  audit_samples_per_family: 25
  qwen_subset_size: 600
  image_splits: ["val"]

model:
  clip_name: "openai/clip-vit-base-patch32"
  qwen_name: "Qwen/Qwen2.5-VL-3B-Instruct"
  use_qwen_4bit: true
  hidden_dim: 256
  num_attention_heads: 4
  dropout: 0.1
  max_qwen_tokens: 96

training:
  num_workers: 2
  device: "auto"
  log_every_epoch: true
  selection_metric: "macro_f1"
  clip_batch_size: 16
  joint_feature_batch_size: 16
  token_feature_batch_size: 8
  sweeps:
    prototype:
      linear_probe:
        trials:
          - name: "lp_p1"
            epochs: 5
            batch_size: 16
            learning_rate: 0.0005
            weight_decay: 0.01
          - name: "lp_p2"
            epochs: 8
            batch_size: 16
            learning_rate: 0.0003
            weight_decay: 0.01
          - name: "lp_p3"
            epochs: 10
            batch_size: 32
            learning_rate: 0.0003
            weight_decay: 0.005
      cross_attention:
        trials:
          - name: "ca_p1"
            epochs: 5
            batch_size: 8
            learning_rate: 0.0005
            weight_decay: 0.01
          - name: "ca_p2"
            epochs: 8
            batch_size: 8
            learning_rate: 0.0003
            weight_decay: 0.01
          - name: "ca_p3"
            epochs: 10
            batch_size: 4
            learning_rate: 0.0001
            weight_decay: 0.005
    midscale:
      linear_probe:
        trials:
          - name: "lp_m1"
            epochs: 10
            batch_size: 16
            learning_rate: 0.0005
            weight_decay: 0.01
          - name: "lp_m2"
            epochs: 15
            batch_size: 16
            learning_rate: 0.0003
            weight_decay: 0.01
          - name: "lp_m3"
            epochs: 20
            batch_size: 32
            learning_rate: 0.0003
            weight_decay: 0.005
          - name: "lp_m4"
            epochs: 25
            batch_size: 32
            learning_rate: 0.0001
            weight_decay: 0.01
          - name: "lp_m5"
            epochs: 30
            batch_size: 16
            learning_rate: 0.0001
            weight_decay: 0.005
      cross_attention:
        trials:
          - name: "ca_m1"
            epochs: 10
            batch_size: 8
            learning_rate: 0.0005
            weight_decay: 0.01
          - name: "ca_m2"
            epochs: 15
            batch_size: 8
            learning_rate: 0.0003
            weight_decay: 0.01
          - name: "ca_m3"
            epochs: 20
            batch_size: 4
            learning_rate: 0.0001
            weight_decay: 0.01
          - name: "ca_m4"
            epochs: 25
            batch_size: 8
            learning_rate: 0.0001
            weight_decay: 0.005
          - name: "ca_m5"
            epochs: 30
            batch_size: 4
            learning_rate: 0.0003
            weight_decay: 0.001
    final:
      linear_probe:
        trials:
          - name: "lp_f1"
            epochs: 30
            batch_size: 16
            learning_rate: 0.0005
            weight_decay: 0.01
          - name: "lp_f2"
            epochs: 35
            batch_size: 16
            learning_rate: 0.0003
            weight_decay: 0.01
          - name: "lp_f3"
            epochs: 40
            batch_size: 32
            learning_rate: 0.0003
            weight_decay: 0.005
          - name: "lp_f4"
            epochs: 45
            batch_size: 32
            learning_rate: 0.0001
            weight_decay: 0.01
          - name: "lp_f5"
            epochs: 50
            batch_size: 16
            learning_rate: 0.0001
            weight_decay: 0.005
          - name: "lp_f6"
            epochs: 55
            batch_size: 32
            learning_rate: 0.0001
            weight_decay: 0.001
          - name: "lp_f7"
            epochs: 45
            batch_size: 64
            learning_rate: 0.0003
            weight_decay: 0.001
      cross_attention:
        trials:
          - name: "ca_f1"
            epochs: 25
            batch_size: 8
            learning_rate: 0.0005
            weight_decay: 0.01
          - name: "ca_f2"
            epochs: 30
            batch_size: 8
            learning_rate: 0.0003
            weight_decay: 0.01
          - name: "ca_f3"
            epochs: 35
            batch_size: 4
            learning_rate: 0.0001
            weight_decay: 0.01
          - name: "ca_f4"
            epochs: 40
            batch_size: 8
            learning_rate: 0.0001
            weight_decay: 0.005
          - name: "ca_f5"
            epochs: 35
            batch_size: 8
            learning_rate: 0.0003
            weight_decay: 0.001
          - name: "ca_f6"
            epochs: 30
            batch_size: 4
            learning_rate: 0.0001
            weight_decay: 0.001
          - name: "ca_f7"
            epochs: 25
            batch_size: 4
            learning_rate: 0.00005
            weight_decay: 0.005

performance:
  active_profile: "auto"
  compatibility_mode: false
  colab_scratch_root: "/content/comp646_scratch"
  gpu_profiles:
    default:
      clip_precision: "auto"
      qwen_precision: "auto"
      training_amp_precision: "auto"
      qwen_batch_size: "auto"
      clip_num_workers: 2
      persistent_workers: false
      prefetch_factor: null
      amp_training: true
      early_stopping_patience: 3
      early_stopping_min_delta: 0.001
      qwen_cache_mode: "direct"
      qwen_cache_flush_every: 8
    t4:
      clip_precision: "fp16"
      qwen_precision: "fp16"
      training_amp_precision: "fp16"
      qwen_batch_size: "auto"
      clip_num_workers: 4
      persistent_workers: true
      prefetch_factor: 2
      amp_training: true
      early_stopping_patience: 2
      early_stopping_min_delta: 0.001
      qwen_cache_mode: "scratch_then_sync"
      qwen_cache_flush_every: 8
    h100:
      clip_precision: "bf16"
      qwen_precision: "bf16"
      training_amp_precision: "bf16"
      qwen_batch_size: "auto"
      clip_num_workers: 8
      persistent_workers: true
      prefetch_factor: 4
      amp_training: true
      early_stopping_patience: 3
      early_stopping_min_delta: 0.0005
      qwen_cache_mode: "scratch_then_sync"
      qwen_cache_flush_every: 16

evaluation:
  bootstrap_samples: 500
  threshold_grid_size: 200
  save_figures_as_pdf: true

audit:
  overall_label_valid_threshold: 0.90
  overall_grammar_ok_threshold: 0.90
  per_family_label_valid_threshold: 0.80
  require_all_rows_reviewed: true
  require_qwen_for_readiness: true
